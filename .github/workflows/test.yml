name: Run Test
run-name: application test
on: 
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
env:
  NODE_VERSION: 22
  PNPM_VERSION: 10
  
jobs:
  test:
    name: Tests
    runs-on: ubuntu-latest
    continue-on-error: false
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup-node-pnpm
        with:
          node-version: ${{env.NODE_VERSION}}
          pnpm-version: ${{env.PNPM_VERSION}}
      - name: Run Vitest
        run: |
            pnpm vitest run \
            --reporter=json \
            --outputFile=vitest-report/results.json
      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: vitest-report
          path: vitest-report/results.json
      - name: Annotate PR if tests failed
        if: always()
        run: |
          if [ -f vitest-report/results.json ] && jq -e '.numFailedTests > 0' vitest-report/results.json > /dev/null; then
            echo "::warning title=Tests Failed::Some tests failed. See the vitest-report artifact for details."
          fi
